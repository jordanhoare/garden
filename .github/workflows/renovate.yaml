name: Renovate

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — plan changes without opening PRs"
        type: boolean
        default: false
      log_level:
        description: "Log level (debug, info, warn, error)"
        default: info
        required: false
      version:
        description: "Renovate version (default: latest)"
        default: latest
        required: false
  schedule:
    - cron: "0 2 * * 0" # every Sunday at 02:00 UTC — matches renovate.json schedule
  push:
    branches:
      - master
    paths:
      - .github/renovate.json

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: renovatebot/github-action@v43.0.4
        with:
          renovate-version: ${{ inputs.version || 'latest' }}
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          RENOVATE_AUTODISCOVER: "true"
          RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository }}"
          RENOVATE_DRY_RUN: ${{ inputs.dry_run == true && 'full' || 'false' }}
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: enabled
          RENOVATE_GIT_AUTHOR: "renovate[bot] <renovate[bot]@users.noreply.github.com>"
