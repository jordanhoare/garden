name: Linting

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - "src/garden/**"
  push:
    branches:
      - master
    paths:
      - "src/garden/**"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - uses: pre-commit/action@v3.0.1
