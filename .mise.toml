[tools]
node = "22"

[tasks.setup]
description = "Bootstrap a new machine (run once after clone)"
depends = ["deps", "hooks"]

[tasks.deps]
description = "Install Quartz npm dependencies"
run = "cd quartz && npm ci"

[tasks.hooks]
description = "Install pre-commit hooks"
run = "pre-commit install"

[tasks.prepare]
description = "Run pre-commit hooks against all garden files"
run = "pre-commit run --all-files"

[tasks.clean]
description = "Remove generated build artefacts"
run = "rm -rf quartz/public quartz/.quartz-cache quartz/content"

[tasks.build]
description = "Sync garden content and build the Quartz site"
run = [
    "rsync -av --exclude='09 - Meta/Templates' garden/ quartz/content/",
    "cd quartz && npx quartz build",
]

[tasks.serve]
description = "Sync garden content and serve locally with live reload"
run = [
    "rsync -av --exclude='09 - Meta/Templates' garden/ quartz/content/",
    "cd quartz && npx quartz build --serve -d public",
]

[tasks.sync]
description = "Format, pull latest changes, commit garden edits, and push"
run = """
pre-commit run --all-files > /dev/null 2>&1 || true
pre-commit run --all-files || { echo "ERROR: formatting failed after auto-fix pass — run 'mise run prepare' to inspect"; exit 1; }
git pull --rebase --autostash
git add .
git diff --cached --quiet || git commit -m "chore: sync notes $(date +%Y-%m-%dT%H:%M)"
git push
"""
