[tools]
node = "22"

[tasks.setup]
description = "Bootstrap a new machine (run once after clone)"
depends = ["deps", "hooks"]

[tasks.deps]
description = "Install Quartz npm dependencies"
run = "cd src/quartz && npm ci"

[tasks.hooks]
description = "Install pre-commit hooks"
run = "pre-commit install"

[tasks.build]
description = "Sync garden content and build the Quartz site"
run = [
    "rsync -av --exclude='09 - Meta/Templates' src/garden/ src/quartz/content/",
    "cd src/quartz && npx quartz build",
]

[tasks.serve]
description = "Sync garden content and serve locally with live reload"
run = [
    "rsync -av --exclude='09 - Meta/Templates' src/garden/ src/quartz/content/",
    "cd src/quartz && npx quartz build --serve -d public",
]

[tasks.sync]
description = "Format, pull latest changes, commit garden edits, and push"
run = """
echo "==> Formatting garden files..."
pre-commit run --all-files
pre-commit run --all-files || { echo "ERROR: Formatting failed after auto-fix pass. Run 'mise run prepare' to inspect issues."; exit 1; }

echo "==> Pulling latest changes..."
git pull --rebase --autostash

echo "==> Staging and committing garden changes..."
git add .
git diff --cached --quiet || git commit -m "chore: sync notes $(date +%Y-%m-%dT%H:%M)"

echo "==> Pushing..."
git push
"""

[tasks.prepare]
description = "Run pre-commit hooks against all garden files"
run = "pre-commit run --all-files"

[tasks.clean]
description = "Remove generated build artefacts"
run = "rm -rf src/quartz/public src/quartz/.quartz-cache src/quartz/content"
