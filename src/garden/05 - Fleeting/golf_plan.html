function rb(block){
  const id='b'+Math.random().toString(36).substr(2,9);
  let h='';
  if(block.note)h+=`<div class="notebox"><div class="box-label">Note</div>${block.note}</div>`;
  if(block.optbox)h+=`<div class="optbox"><div class="box-label">Optional</div>${block.optbox}</div>`;
  if(block.focusBox)h+=`<div class="fbox"><div class="box-label">${block.focusBox.l}</div>${block.focusBox.t}</div>`;
  if(block.gameBox)h+=`<div class="gbox"><div class="box-label">${block.gameBox.l}</div>${block.gameBox.t}</div>`;
  if(block.sections)block.sections.forEach(s=>{h+=`<div class="ds"><div class="dl">${s.l}</div><ul class="dlist">${s.items.map(i=>`<li class="di"><span class="dot"></span><span>${i}</span></li>`).join('')}</ul></div>`;});
  if(block.metrics)h+=`<div class="mgrid">${block.metrics.map(m=>`<div class="mc"><div class="ml">${m.l}</div><div class="mv">${m.v}</div><div class="mn">${m.n}</div></div>`).join('')}</div>`;
  return`<div class="block"><div class="bh" onclick="tog('${id}')"><span class="badge ${block.bc}">${block.badge}</span><span class="btitle">${block.title}</span>${block.dur?`<span class="bdur">${block.dur}</span>`:''}<span class="bchev" id="cv-${id}">▼</span></div><div class="bb" id="${id}">${h}</div></div>`;
}

function tog(id){
  document.getElementById(id).classList.toggle('open');
  document.getElementById('cv-'+id).classList.toggle('open');
}

function rs(key){
  const s=S[key];
  return`<div class="sh"><div><div class="st">${s.title}</div><div class="sm">${s.venue} &middot; ${s.time}</div></div><div class="chips">${s.chips.map(c=>`<span class="chip ${c.c}">${c.l}</span>`).join('')}</div></div><div class="timeline">${s.tbar.map(t=>`<div class="tseg" style="flex:${t.p};background:${t.col}"></div>`).join('')}</div><div class="blocks">${s.blocks.map(rb).join('')}</div>`;
}

function sw(day){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-day="${day}"]`).classList.add('active');
  document.getElementById('sc').innerHTML=rs(day);
}

document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('[data-day]');
  if(t)sw(t.dataset.day);
});

sw('mon');
</script>
